---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: ${APP}
  namespace: databases
spec:
  name: ${APP}
  owner: ${OWNER}
  cluster:
    name: postgres
  ensure: present
  extensions: ${EXTENSIONS:=${emptyArray}}
