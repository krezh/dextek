---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ${APP}-postgres-cert
spec:
  secretName: ${APP}-postgres-cert
  usages:
    - client auth
  commonName: ${DATABASE_OWNER:=${APP}}
  issuerRef:
    name: postgres-client-ca
    kind: ClusterIssuer
    group: cert-manager.io
