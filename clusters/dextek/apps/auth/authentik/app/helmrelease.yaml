---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: authentik
  values:
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: authentik-secret
      deploymentStrategy:
        type: RollingUpdate
      env:
        - name: AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS
          value: 10.244.0.0/16
      envFrom:
        - secretRef:
            name: authentik-secret
    prometheus:
      rules:
        enabled: true
    server:
      replicas: 2
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      ingress:
        enabled: false
    worker:
      replicas: 2
      lifecycle:
        postStart:
          exec:
            command:
              - /bin/sh
              - -c
              - |
                (
                  until curl -sf -H "Authorization: Bearer $AUTHENTIK_BOOTSTRAP_TOKEN" \
                    http://authentik-server.auth.svc.cluster.local/api/v3/root/config/ > /dev/null; do
                    sleep 2
                  done
                  curl -sf -H "Authorization: Bearer $AUTHENTIK_BOOTSTRAP_TOKEN" \
                    "http://authentik-server.auth.svc.cluster.local/api/v3/tasks/schedules/?actor_name=authentik.outposts.tasks.outpost_controller&page_size=100" \
                    | python3 -c "
                import json, sys
                for s in json.load(sys.stdin)['results']:
                    print(s['id'])
                " | while read -r id; do
                      curl -sf -X POST -H "Authorization: Bearer $AUTHENTIK_BOOTSTRAP_TOKEN" \
                        "http://authentik-server.auth.svc.cluster.local/api/v3/tasks/schedules/$id/send/"
                    done
                ) &
