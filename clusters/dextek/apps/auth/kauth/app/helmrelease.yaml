---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kauth
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kauth
  values:
    replicaCount: 3
    podAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: kauth-secret
    # Dedicated TLS listener for /webhook/token-review on :8443. The client-facing
    # API stays plain HTTP behind gateway-internal (which terminates TLS); only the
    # apiserver->kauth webhook hop uses this. Cert from cert-manager (certificate.yaml).
    webhook:
      enabled: true
      secretName: kauth-webhook-tls
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          url: https://kauth.plexuz.xyz/health
      parentRefs:
        - name: gateway-internal
          namespace: network
      hostnames: ["kauth.plexuz.xyz"]
