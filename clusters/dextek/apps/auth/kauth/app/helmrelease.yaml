---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kauth
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kauth
  # Pin the Service clusterIP so the API server webhook config (Talos
  # controlplane.yaml) has a stable, git-knowable target — *.svc DNS does not
  # resolve from the host-netns API server, so it dials this IP via Cilium socketLB.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: kauth
            patch: |
              - op: add
                path: /spec/clusterIP
                value: __KAUTH_CLUSTERIP__ # TODO: free IP in the service CIDR (Talos default 10.96.0.0/12)
  values:
    replicaCount: 3
    podAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: kauth-secret
    # TODO: once the kauth chart supports TLS serving for /webhook/token-review,
    # mount the kauth-webhook-tls secret and enable HTTPS on :8443. Requires the
    # kauth app/chart to actually serve TLS (kauth-side change, not yet released).
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          url: https://kauth.plexuz.xyz/health
      parentRefs:
        - name: gateway-internal
          namespace: network
      hostnames: ["kauth.plexuz.xyz"]
