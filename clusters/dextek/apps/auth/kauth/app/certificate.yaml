---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kauth-webhook-tls
spec:
  secretName: kauth-webhook-tls
  dnsNames:
    - kauth.auth.svc
    - kauth.auth.svc.cluster.local
  issuerRef:
    name: cluster-ca
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always
