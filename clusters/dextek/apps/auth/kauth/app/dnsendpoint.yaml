---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: kauth
  annotations:
    external-dns.alpha.kubernetes.io/provider: unifi
spec:
  endpoints:
    - dnsName: _kauth.plexuz.xyz.
      recordType: TXT
      targets:
        - "v=kauth1 url=https://kauth.plexuz.xyz name=dextek"
