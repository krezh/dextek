---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-webhook-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: github-webhook-token-secret
    template:
      data:
        token: "{{ .FLUX_GITHUB_WEBHOOK_TOKEN }}"
  data:
    - secretKey: FLUX_GITHUB_WEBHOOK_TOKEN
      remoteRef:
        key: /Kubernetes/DexTek/Flux/FLUX_GITHUB_WEBHOOK_TOKEN
