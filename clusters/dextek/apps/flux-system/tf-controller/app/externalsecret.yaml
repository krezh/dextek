---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tf-controller-sops
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tf-controller-sops-secret
    template:
      data:
        keys.txt: "{{ .SOPS_KEY }}"
  data:
    - secretKey: SOPS_KEY
      remoteRef:
        key: /Kubernetes/DexTek/TFController/SOPS_KEY
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tf-controller-tfrc
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tf-controller-tfrc-secret
    template:
      data:
        terraform.tfrc: |
          credentials "app.terraform.io" {
            token = "{{ .TERRAFORM_CLOUD_TOKEN }}"
          }
  data:
    - secretKey: TERRAFORM_CLOUD_TOKEN
      remoteRef:
        key: /Kubernetes/DexTek/TFController/TERRAFORM_CLOUD_TOKEN
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tf-controller-infisical
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tf-controller-infisical-secret
    template:
      data:
        INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: "{{ .INFISICAL_ID }}"
        INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: "{{ .INFISICAL_SECRET }}"
        SSH_PRIVATE_KEY: "{{ .SSH_PRIVATE_KEY }}"
  data:
    - secretKey: INFISICAL_ID
      remoteRef:
        key: /Kubernetes/DexTek/TFController/INFISICAL_ID
    - secretKey: INFISICAL_SECRET
      remoteRef:
        key: /Kubernetes/DexTek/TFController/INFISICAL_SECRET
    - secretKey: SSH_PRIVATE_KEY
      remoteRef:
        key: /Terraform/Hetzner/SSH_PRIVATE_KEY
