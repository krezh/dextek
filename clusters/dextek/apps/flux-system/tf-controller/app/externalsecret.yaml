---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tf-controller-sops
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tf-controller-sops-secret
    template:
      data:
        keys.txt: "{{ .SOPS_KEY }}"
  dataFrom:
    - find:
        path: /Kubernetes/DexTek/TFController
        name:
          regexp: "(.*)"
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tf-controller-tfrc
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tf-controller-tfrc-secret
    template:
      data:
        terraform.tfrc: |
          credentials "app.terraform.io" {
            token = "{{ .TERRAFORM_CLOUD_TOKEN }}"
          }
  dataFrom:
    - find:
        path: /Kubernetes/DexTek/TFController
        name:
          regexp: "(.*)"
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tf-controller-infisical
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: tf-controller-infisical-secret
    template:
      data:
        TF_VAR_infisical_client_id: "{{ .INFISICAL_CLIENT_ID}}"
        TF_VAR_infisical_client_secret: "{{ .INFISICAL_CLIENT_SECRET}}"
  dataFrom:
    - find:
        path: /Kubernetes/DexTek/TFController
        name:
          regexp: "(.*)"
