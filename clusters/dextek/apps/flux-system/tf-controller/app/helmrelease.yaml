---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  values:
    awsPackage:
      repository: ghcr.io/flux-iac/aws-primitive-modules
      tag: v4.38.0-v1alpha11
    image:
      repository: ghcr.io/flux-iac/tofu-controller
      pullPolicy: IfNotPresent
      tag: v0.16.2
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.11.5@sha256:97b33c898abe78bb6ed52a56182063376ba60e142c05dfc101036678f71c8fe0
    installCRDs: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
