---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  values:
    awsPackage:
      repository: ghcr.io/flux-iac/aws-primitive-modules
      tag: v4.38.0-v1alpha11
    image:
      repository: ghcr.io/flux-iac/tofu-controller
      pullPolicy: IfNotPresent
      tag: v0.16.3
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.11.7@sha256:7845404382f0922902e2667bd60e36872caa02ccd00855c5d6ac48721e9939f4
    installCRDs: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
