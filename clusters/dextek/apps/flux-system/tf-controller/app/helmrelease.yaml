---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  values:
    awsPackage:
      repository: ghcr.io/flux-iac/aws-primitive-modules
      tag: v4.38.0-v1alpha11
    image:
      repository: ghcr.io/flux-iac/tofu-controller
      pullPolicy: IfNotPresent
      tag: v0.16.4
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.12.3@sha256:df711c1e86f06f7d9b806cce86cccdf75c05d154b44aa62233e7f3eb382cbda4
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
