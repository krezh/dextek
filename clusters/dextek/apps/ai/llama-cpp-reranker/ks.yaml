---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app llama-cpp-reranker
  namespace: flux-system
spec:
  targetNamespace: ai
  dependsOn:
    - name: rook-ceph-cluster
  path: ./clusters/dextek/apps/ai/llama-cpp-reranker/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: false
  interval: 1h
  timeout: 5m
  components:
    - ../../../../../shared/components/gpu
  postBuild:
    substitute:
      APP: *app
