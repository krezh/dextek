---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentmemory
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: agentmemory
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: forge.wynning.tech/james/agentmemory
              tag: v0.9.12-1@sha256:ab4cfa40e5be9c96bc80fdd44f6460e0ac20625ec3f2e5def2493ad42ef6f5c9
            env:
              AGENTMEMORY_TOOLS: all
              EMBEDDING_PROVIDER: local
              III_REST_PORT: "3111"
            envFrom:
              - secretRef:
                  name: agentmemory-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  failureThreshold: 3
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  failureThreshold: 3
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /agentmemory/livez
                    port: 3111
                  failureThreshold: 60
                  periodSeconds: 5
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 256M
              limits:
                memory: 1Gi
    service:
      main:
        controller: main
        ports:
          api:
            port: 3111
          viewer:
            port: 3113
    route:
      api:
        hostnames:
          - "agentmemory-api.plexuz.xyz"
        parentRefs:
          - name: gateway-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: main
                port: 3111
      viewer:
        hostnames:
          - "agentmemory.plexuz.xyz"
        parentRefs:
          - name: gateway-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: 3113
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          main:
            main:
              - path: /data
      tmpfs:
        type: emptyDir
        sizeLimit: 1Gi
        medium: Memory
        globalMounts:
          - path: /tmp
            subPath: tmp
