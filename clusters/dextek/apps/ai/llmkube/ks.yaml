---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmkube
  namespace: flux-system
spec:
  targetNamespace: ai
  commonMetadata:
    labels:
      app.kubernetes.io/name: llmkube
  path: ./clusters/dextek/apps/ai/llmkube/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  interval: 1h
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: llmkube
      namespace: ai
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmkube-models
  namespace: flux-system
spec:
  targetNamespace: ai
  commonMetadata:
    labels:
      app.kubernetes.io/name: llmkube-models
  dependsOn:
    - name: llmkube
  path: ./clusters/dextek/apps/ai/llmkube/models
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  interval: 1h
  timeout: 5m
