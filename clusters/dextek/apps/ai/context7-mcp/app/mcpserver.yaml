---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: context7
spec:
  image: ghcr.io/stacklok/dockyard/npx/context7:3.2.2
  transport: stdio
  proxyPort: 8080
  groupRef:
    name: mcp-tools
  permissionProfile:
    type: builtin
    name: network
  secrets:
    - name: context7-secret
      key: CONTEXT7_API_KEY
      targetEnvName: CONTEXT7_API_KEY
