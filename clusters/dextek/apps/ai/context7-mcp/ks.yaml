---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: context7-mcp
  namespace: flux-system
spec:
  targetNamespace: ai
  commonMetadata:
    labels:
      app.kubernetes.io/name: context7-mcp
  dependsOn:
    - name: toolhive-operator-crds
  path: ./clusters/dextek/apps/ai/context7-mcp/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  interval: 1h
  timeout: 5m
