---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-nixos
  namespace: flux-system
spec:
  targetNamespace: ai
  dependsOn:
    - name: toolhive-operator-config
  path: ./clusters/dextek/apps/ai/nixos-mcp/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: false
  interval: 1h
