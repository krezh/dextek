---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name memini
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: memini
  values:
    global:
      fullnameOverride: *name
    defaultPodOptions:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
    controllers:
      main:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          main:
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
            env:
              MEMINI_BACKEND: postgres
              MEMINI_LOG_FORMAT: json
              MEMINI_DEMOTE_AFTER: 1440h
              MEMINI_TOMBSTONE_TTL: 720h
              MEMINI_EMBED_BASE_URL: http://mcp-tools-embedding:8080/v1
              MEMINI_EMBED_MODEL: all-MiniLM-L6-v2
              MEMINI_EMBED_DIMS: "384"
              MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              MEMINI_RECALL_EMBED_TIMEOUT: "10s"
              MEMINI_RERANK: http://qwen3-reranker-0-6b:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker-0.6b
              MEMINI_POSTGRES_DSN:
                valueFrom:
                  secretKeyRef:
                    name: memini-postgres
                    key: url
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini-secret
                    key: MEMINI_API_KEY
    route:
      ui:
        enabled: true
        annotations:
          gatus.home-operations.com/endpoint: |-
            path: /healthz
        parentRefs:
          - name: gateway-internal
            namespace: network
        hostnames:
          - memini.plexuz.xyz
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
    persistence:
      data:
        enabled: false
