---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich
  namespace: flux-system
spec:
  targetNamespace: immich
  dependsOn:
    - name: cnpg-cluster
    - name: dragonfly-cluster
    - name: external-secrets-stores
  path: ./clusters/dextek/apps/immich/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  components:
    - ../../../../shared/components/cnpg/cert
    - ../../../../shared/components/gpu
  postBuild:
    substitute:
      APP: *app
