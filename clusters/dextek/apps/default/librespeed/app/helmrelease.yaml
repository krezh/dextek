---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name librespeed
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: librespeed
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        # https://github.com/librespeed/speedtest/issues/663
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: false
    controllers:
      librespeed:
        strategy: RollingUpdate
        containers:
          librespeed:
            image:
              repository: ghcr.io/librespeed/speedtest
              tag: 6.2.0@sha256:199ddbb3543f7f988e99c9c3a7c4d31c1683d2adbba9597557ca4770082368ae
            env:
              MODE: standalone
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              # cp: cannot create regular file '/var/www/html/speedtest.js': Read-only file system
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - CHOWN
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 50M
              limits:
                memory: 161M
    service:
      librespeed:
        controller: *name
        ports:
          http:
            port: &port 8080
    route:
      external:
        hostnames:
          - speed.plexuz.xyz
        parentRefs:
          - name: gateway-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: librespeed
                port: *port
