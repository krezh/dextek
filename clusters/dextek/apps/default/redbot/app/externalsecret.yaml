---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redbot
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: redbot-secret
    template:
      data:
        TOKEN: "{{ .REDBOT_TOKEN }}"
        OWNER: "{{ .REDBOT_OWNER }}"
        PREFIX: "{{ .REDBOT_PREFIX }}"
  data:
    - secretKey: REDBOT_TOKEN
      remoteRef:
        key: /Kubernetes/DexTek/Redbot/REDBOT_TOKEN
    - secretKey: REDBOT_OWNER
      remoteRef:
        key: /Kubernetes/DexTek/Redbot/REDBOT_OWNER
    - secretKey: REDBOT_PREFIX
      remoteRef:
        key: /Kubernetes/DexTek/Redbot/REDBOT_PREFIX
