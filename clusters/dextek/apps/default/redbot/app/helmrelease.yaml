---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redbot
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: redbot
  values:
    controllers:
      app:
        pod:
          hostUsers: false
        containers:
          app:
            image:
              repository: phasecorex/red-discordbot
              tag: extra-audio-py311@sha256:dcc31b9978dc0c474c8521a6601d0996645bb71ac5f5d72c817daad727b70688
            env:
              PUID: 568
              PGID: 568
            envFrom:
              - secretRef:
                  name: redbot-secret
            resources:
              requests:
                cpu: 50m
                memory: 400M
              limits:
                memory: 843M
    persistence:
      config:
        existingClaim: redbot-config
        globalMounts:
          - path: /data
