---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: publish-k8s-schemas
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: publish-k8s-schemas
  values:
    mode: cronjob

    cronjob:
      schedule: "0 */4 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 3

    config:
      basePath: "/k8s-schemas"

    extraVolumes:
      - name: git-workspace
        emptyDir: {}
      - name: git-home
        emptyDir: {}
      - name: git-tmp
        emptyDir: {}

    extraContainers:
      - name: git-push
        image: alpine/git:v2.54.0
        command: ["/bin/sh", "-c"]
        args:
          - |
            while [ ! -f /data/current/index.html ]; do sleep 5; done

            git config --global user.name "crd-schema-publisher"
            git config --global user.email "crd-schema-publisher@users.noreply.github.com"
            git config --global --add safe.directory /repo

            if [ -z "$(ls -A /repo)" ]; then
              git clone --branch "${GIT_BRANCH}" --single-branch \
                "https://x-access-token:${GITHUB_TOKEN}@github.com/${GIT_REPO}.git" /repo || {
                git init /repo
                cd /repo
                git checkout -b "${GIT_BRANCH}"
                git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GIT_REPO}.git"
              }
            fi

            cd /repo
            rm -rf /tmp/site-sync
            mkdir -p /tmp/site-sync
            cp -r /data/current/. /tmp/site-sync/
            rm -rf /tmp/site-sync/_meta
            rm -rf /repo/schemas
            mkdir -p /repo/schemas
            cp -r /tmp/site-sync/. /repo/schemas/
            git add -A
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update CRD schemas ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
              git push origin "${GIT_BRANCH}"
            fi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: publish-k8s-schemas-git-push
                key: github-token
          - name: GIT_REPO
            valueFrom:
              secretKeyRef:
                name: publish-k8s-schemas-git-push
                key: github-repo
          - name: GIT_BRANCH
            value: "main"
          - name: HOME
            value: "/home/git"
        volumeMounts:
          - name: output
            mountPath: /data
            readOnly: true
          - name: git-workspace
            mountPath: /repo
          - name: git-home
            mountPath: /home/git
          - name: git-tmp
            mountPath: /tmp
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
