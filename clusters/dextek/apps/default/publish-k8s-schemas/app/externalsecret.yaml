---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: publish-k8s-schemas-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: publish-k8s-schemas-secret
    template:
      data:
        GIT_TOKEN: "{{ .GITHUB_TOKEN }}"
  dataFrom:
    - find:
        path: /Kubernetes/DexTek/PublishK8sSchemas
        name:
          regexp: "(.*)"
