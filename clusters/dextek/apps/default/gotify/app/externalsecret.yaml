---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gotify
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: gotify-secret
    template:
      data:
        GOTIFY_DEFAULTUSER_NAME: "{{ .GOTIFY_DEFAULTUSER_NAME }}"
        GOTIFY_DEFAULTUSER_PASS: "{{ .GOTIFY_DEFAULTUSER_PASS }}"
  data:
    - secretKey: GOTIFY_DEFAULTUSER_NAME
      remoteRef:
        key: /Kubernetes/DexTek/Gotify/GOTIFY_DEFAULTUSER_NAME
    - secretKey: GOTIFY_DEFAULTUSER_PASS
      remoteRef:
        key: /Kubernetes/DexTek/Gotify/GOTIFY_DEFAULTUSER_PASS
