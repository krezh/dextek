---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mealie
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: mealie-secret
    template:
      data:
        OIDC_CLIENT_ID: "{{ .MEALIE_OAUTH_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .MEALIE_OAUTH_CLIENT_SECRET }}"
        OPENAI_API_KEY: "{{ .MEALIE_OPENAI_API_KEY }}"
  data:
    - secretKey: MEALIE_OAUTH_CLIENT_ID
      remoteRef:
        key: /Kubernetes/DexTek/Mealie/MEALIE_OAUTH_CLIENT_ID
    - secretKey: MEALIE_OAUTH_CLIENT_SECRET
      remoteRef:
        key: /Kubernetes/DexTek/Mealie/MEALIE_OAUTH_CLIENT_SECRET
    - secretKey: MEALIE_OPENAI_API_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Mealie/MEALIE_OPENAI_API_KEY
