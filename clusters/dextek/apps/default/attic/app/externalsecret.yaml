---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: attic
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: attic-secret
    template:
      data:
        ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64: "{{ .ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64 }}"
        AWS_ACCESS_KEY_ID: "{{ .ATTIC_AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .ATTIC_AWS_SECRET_ACCESS_KEY }}"
  data:
    - secretKey: ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64
      remoteRef:
        key: /Kubernetes/DexTek/Attic/ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64
    - secretKey: ATTIC_AWS_ACCESS_KEY_ID
      remoteRef:
        key: /Kubernetes/DexTek/Attic/ATTIC_AWS_ACCESS_KEY_ID
    - secretKey: ATTIC_AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Attic/ATTIC_AWS_SECRET_ACCESS_KEY
