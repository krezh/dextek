---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/gateway.envoyproxy.io/backendtrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: attic
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: attic-external
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: attic-internal
  # Disable compression - NARs are already compressed by Attic with zstd
  compressor: []
  timeout:
    http:
      # Increase timeout for large NAR uploads/downloads
      requestTimeout: 0s
      connectionIdleTimeout: 300s
