---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app attic
  namespace: flux-system
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: cnpg-cluster
    - name: external-secrets-stores
    - name: volsync
  path: ./clusters/dextek/apps/default/attic/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 15m
  components:
    - ../../../../../shared/components/cnpg/cert
    - ../../../../../shared/components/volsync
    - ../../../../../shared/components/kopiur/backup
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 150Gi
      VOLSYNC_CACHE_CAPACITY: 50Gi
      KOPIUR_CLAIM: attic-config
      KOPIUR_CAPACITY: 150Gi
