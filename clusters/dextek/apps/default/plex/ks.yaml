---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app plex
  namespace: flux-system
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: volsync
    - name: external-secrets-stores
  path: ./clusters/dextek/apps/default/plex/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 15m
  components:
    - ../../../../../shared/components/gpu
    - ../../../../../shared/components/volsync
    - ../../../../../shared/components/kopiur/backup
    - ../../../../../shared/components/zeroscaler
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 300Gi
      VOLSYNC_CACHE_CAPACITY: 100Gi
      KOPIUR_CLAIM: plex-config
      KOPIUR_CAPACITY: 300Gi
