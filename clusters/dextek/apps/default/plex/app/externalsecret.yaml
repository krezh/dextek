---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plex
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: plex-secret
    template:
      data:
        PLEX_CLAIM_TOKEN: "{{ .PLEX_CLAIM }}"
  data:
    - secretKey: PLEX_CLAIM
      remoteRef:
        key: /Kubernetes/DexTek/Plex/PLEX_CLAIM
