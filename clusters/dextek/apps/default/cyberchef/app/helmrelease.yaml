---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cyberchef
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: cyberchef
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
    controllers:
      app:
        type: deployment
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/mpepping/cyberchef
              tag: v10.23.0@sha256:37955fd1e28397c6dce0858210d839b92a6291e870d6f20d27e1f3efff93de27
            resources:
              requests:
                cpu: 15m
                memory: 27M
              limits:
                memory: 105M
    service:
      app:
        controller: app
        ports:
          http:
            port: &port 8000
    route:
      app:
        hostnames: ["chef.plexuz.xyz"]
        parentRefs:
          - name: gateway-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
