---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: xilo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: xilo-secret
  data:
    - secretKey: XILO_ADMIN_PASSWORD
      remoteRef:
        key: /Kubernetes/DexTek/Xilo/XILO_ADMIN_PASSWORD
    - secretKey: XILO_SALT
      remoteRef:
        key: /Kubernetes/DexTek/Xilo/XILO_SALT
    - secretKey: XILO_S3_ACCESS_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Xilo/XILO_S3_ACCESS_KEY
    - secretKey: XILO_S3_SECRET_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Xilo/XILO_S3_SECRET_KEY
