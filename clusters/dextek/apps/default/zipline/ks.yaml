---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app zipline
  namespace: flux-system
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: cnpg-cluster
    - name: external-secrets-stores
  path: ./clusters/dextek/apps/default/zipline/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  components:
    - ../../../../../shared/components/cnpg/pass
    - ../../../../../shared/components/zeroscaler
  postBuild:
    substitute:
      APP: *app
      # Prisma's node-postgres adapter verifies the server cert on sslmode=require (unlike
      # libpq); use no-verify to encrypt without trusting our private CA. See cnpg/pass.
      DATABASE_SSLMODE: no-verify
