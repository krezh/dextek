---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zipline
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: zipline
  values:
    controllers:
      zipline:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/diced/zipline
              tag: 4.6.0
            env:
              DATASOURCE_TYPE: local
              DATASOURCE_LOCAL_DIRECTORY: &uploads /uploads
              CORE_HOSTNAME: 0.0.0.0
              CORE_PORT: 3000
            envFrom:
              - secretRef:
                  name: zipline-secret
              - secretRef:
                  name: zipline-postgres-secret
            resources:
              requests:
                memory: 366M
              limits:
                memory: 1500M
    service:
      app:
        controller: zipline
        ports:
          http:
            port: &port 3000
    route:
      external:
        hostnames: ["{{ .Release.Name }}.plexuz.xyz"]
        parentRefs:
          - name: gateway-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      uploads:
        type: nfs
        server: jotunheim.fast.internal
        path: /mnt/tank/k8s/zipline
        globalMounts:
          - path: *uploads
