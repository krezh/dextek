---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zipline
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: zipline-secret
    template:
      data:
        CORE_SECRET: "{{ .ZIPLINE_CORE_SECRET }}"
        OAUTH_OIDC_CLIENT_SECRET: "{{ .ZIPLINE_OAUTH_CLIENT_SECRET }}"
        OAUTH_OIDC_CLIENT_ID: "{{ .ZIPLINE_OAUTH_CLIENT_ID }}"
        OAUTH_OIDC_AUTHORIZE_URL: https://sso.plexuz.xyz/application/o/authorize/
        OAUTH_OIDC_USERINFO_URL: https://sso.plexuz.xyz/application/o/userinfo/
        OAUTH_OIDC_TOKEN_URL: https://sso.plexuz.xyz/application/o/token/
  data:
    - secretKey: ZIPLINE_CORE_SECRET
      remoteRef:
        key: /Kubernetes/DexTek/Zipline/ZIPLINE_CORE_SECRET
    - secretKey: ZIPLINE_OAUTH_CLIENT_ID
      remoteRef:
        key: /Kubernetes/DexTek/Zipline/ZIPLINE_OAUTH_CLIENT_ID
    - secretKey: ZIPLINE_OAUTH_CLIENT_SECRET
      remoteRef:
        key: /Kubernetes/DexTek/Zipline/ZIPLINE_OAUTH_CLIENT_SECRET
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zipline-postgres
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-pgo-secrets
  target:
    name: zipline-postgres-secret
    template:
      data:
        DATABASE_URL: '{{ index . "uri" }}'
  dataFrom:
    - extract:
        key: postgres-pguser-zipline
