---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crunchy-pgo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: crunchy-pgo-secret
    template:
      data:
        s3.conf: |
          [global]
          repo1-s3-key={{ .GARAGE_ACCESS_KEY_ID }}
          repo1-s3-key-secret={{ .GARAGE_SECRET_ACCESS_KEY }}
          repo2-s3-key={{ .R2_ACCESS_KEY_ID }}
          repo2-s3-key-secret={{ .R2_SECRET_ACCESS_KEY }}
        encryption.conf: |
          [global]
          repo1-cipher-pass={{ .CRUNCHY_PGO_CIPHER_PASS }}
          repo2-cipher-pass={{ .CRUNCHY_PGO_CIPHER_PASS }}
  data:
    - secretKey: GARAGE_ACCESS_KEY_ID
      remoteRef:
        key: /Kubernetes/DexTek/CrunchyPostgres/GARAGE_ACCESS_KEY_ID
    - secretKey: GARAGE_SECRET_ACCESS_KEY
      remoteRef:
        key: /Kubernetes/DexTek/CrunchyPostgres/GARAGE_SECRET_ACCESS_KEY
    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: /Kubernetes/DexTek/CrunchyPostgres/R2_ACCESS_KEY_ID
    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: /Kubernetes/DexTek/CrunchyPostgres/R2_SECRET_ACCESS_KEY
    - secretKey: CRUNCHY_PGO_CIPHER_PASS
      remoteRef:
        key: /Kubernetes/DexTek/CrunchyPostgres/CRUNCHY_PGO_CIPHER_PASS
