---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 2

  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:1e9b7f86a108b8eb472f52b59fc085aafee4cb3841484727ad67c020a8935a86

  certificates:
    serverTLSSecret: postgres-server-cert
    serverCASecret: postgres-server-cert
    clientCASecret: postgres-client-ca
    replicationTLSSecret: postgres-replication-cert

  storage:
    size: 50Gi
    storageClass: ceph-block

  # bootstrap:
  #   recovery:
  #     source: &src source

  plugins:
    - name: &plugin barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: &store garage-store

  # externalClusters:
  #   - name: *src
  #     plugin:
  #       name: *plugin
  #       parameters:
  #         barmanObjectName: *store
  #         serverName: postgres

  monitoring:
    enablePodMonitor: false

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          cnpg.io/cluster: postgres

  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true

  postgresql:
    pg_hba:
      # Password apps (members of scram_users) authenticate via scram over TLS.
      - hostssl all +scram_users all scram-sha-256
      # Default: everything else over TLS is the cert/pooler path — cert apps and the
      # pooler's own pooler-rw identity, all mapped from the pooler cert. Nothing to
      # enumerate here, so the pooler can never break by omitting a role.
      - hostssl all all all cert clientcert=verify-full map=pooler-map
      # plaintext (no TLS) fallback
      - host all all all scram-sha-256
    pg_ident:
      - pooler-map pooler-rw all
    shared_preload_libraries:
      - "vchord"
      - "timescaledb"
    parameters:
      max_connections: "500"
      shared_buffers: "512MB"
      max_locks_per_transaction: "4096"
      timescaledb.telemetry_level: "off"
      timescaledb.max_tuples_decompressed_per_dml_transaction: "0"
      search_path: '"$user", public, vchord'

    extensions:
      - name: postgis
        ld_library_path:
          - system
        image:
          reference: ghcr.io/cloudnative-pg/postgis-extension:3.6.3-18-trixie@sha256:feb8e1f65779ef435d5a3f489e4cecec30b332003deac21ca8cf0772a84ca744
      - name: vchord
        image:
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1@sha256:bdea43bed2a414e21bbf71767bf6f0739747ac480b267b51772dc214ac28dcb3
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib/
        extension_control_path:
          - /usr/share/postgresql/18/
      - name: timescaledb
        image:
          reference: ghcr.io/vember31/timescaledb:2.27.1
      - name: timescaledb-toolkit
        image:
          reference: ghcr.io/vember31/timescaledb-toolkit:1.22.0

  managed:
    roles:
      # group role: members authenticate with a password (scram) instead of going through
      # the cert/pooler path (see pg_hba). Tag password apps with inRoles: [scram_users].
      - name: scram_users
        ensure: present
        login: false
      - name: atuin
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: attic
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: authentik
        ensure: present
        login: true
        superuser: false
        disablePassword: false
        passwordSecret:
          name: authentik-postgres
        inRoles:
          - scram_users
      - name: bazarr
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: gotify
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: grafana
        ensure: present
        login: true
        superuser: false
        disablePassword: false
        passwordSecret:
          name: grafana-postgres
        inRoles:
          - scram_users
      - name: immich
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: jellystat
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: miniflux
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: prowlarr
        ensure: present
        login: true
        superuser: false
        disablePassword: false
        passwordSecret:
          name: prowlarr-postgres
        inRoles:
          - scram_users
      - name: tracearr
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: wakapi
        ensure: present
        login: true
        superuser: false
        disablePassword: false
      - name: zipline
        ensure: present
        login: true
        superuser: false
        disablePassword: false
        passwordSecret:
          name: zipline-postgres
        inRoles:
          - scram_users
      - name: pooler-rw
        ensure: present
        login: true
        superuser: false
        disablePassword: true
