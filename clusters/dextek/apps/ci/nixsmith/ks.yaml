---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nixsmith
  namespace: flux-system
spec:
  targetNamespace: ci
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: cnpg-cluster
    - name: external-secrets-stores
  path: ./clusters/dextek/apps/ci/nixsmith/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 15m
  components:
    - ../../../../../shared/components/cnpg/pass
  postBuild:
    substitute:
      APP: *app
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nixsmith-config
  namespace: flux-system
spec:
  targetNamespace: ci
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: nixsmith
  path: ./clusters/dextek/apps/ci/nixsmith/config
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 15m
