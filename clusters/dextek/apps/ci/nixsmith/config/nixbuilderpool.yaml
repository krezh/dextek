---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/nixsmith.io/nixbuilderpool_v1alpha1.json
apiVersion: nixsmith.io/v1alpha1
kind: NixBuilderPool
metadata:
  name: amd64-pool
spec:
  system: x86_64-linux
  image: ghcr.io/krezh/nixsmith-builder:latest
  resources:
    requests:
      cpu: "2"
      memory: 1Gi
  scaling:
    minPods: 0
    maxPods: 10
    jobsPerPod: 1
    idleTimeoutSeconds: 900
