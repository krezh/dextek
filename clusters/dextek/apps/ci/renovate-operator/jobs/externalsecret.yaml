---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate
spec:
  # Tokens from GithubAccessToken are valid for ~1h; refresh at 30m to stay ahead
  refreshInterval: 30m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: renovate-secret
    template:
      type: Opaque
      engineVersion: v2
      data:
        RENOVATE_TOKEN: "{{ .token }}"
        RENOVATE_GITHUB_COM_TOKEN: "{{ .token }}"
        OPERATOR_WEBHOOK_KEY: "{{ .OPERATOR_WEBHOOK_KEY }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: github-auth-token
  data:
    - secretKey: OPERATOR_WEBHOOK_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Renovate/OPERATOR_WEBHOOK_KEY
