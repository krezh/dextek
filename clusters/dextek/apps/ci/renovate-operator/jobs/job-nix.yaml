---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: nix
spec:
  image: ghcr.io/krezh/renovate-nix:43.173.3@sha256:1c1b4c95da8e0eef2881eeb07cbb86177cde8a9377ad99aafd2a4bc46d6cea75
  discoverTopics:
    - renovate-nix
  discoveryFilters:
    - dextek/*
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_GIT_AUTHOR
      value: dextek-bot <dextek-bot@noreply.codeberg.org>
    - name: RENOVATE_REDIS_URL
      value: "redis://dragonfly.databases.svc:6379/4"
    - name: RENOVATE_ALLOWED_COMMANDS
      value: |-
        [
          "^bash -c 'PKG=\\$\\(grep",
          "^nix run github:Mic92/nix-update",
          "^nix run github:nix-community/gomod2nix",
          "^nix run github:purpleclay/go-overlay#govendor",
          "^bash .forgejo/scripts/update-hash.sh",
        ]
  parallelism: 10
  schedule: 0 * * * *
  provider:
    name: forgejo
    endpoint: https://codeberg.org
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  secretRef: &secret renovate-secret
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: *secret
        key: OPERATOR_WEBHOOK_KEY
    forgejo:
      sync:
        enabled: false
        webhookURL: https://renovate-webhook.plexuz.xyz/webhook/v1/forgejo
        topic: renovate-nix
        tokenSecretRef:
          name: *secret
          key: RENOVATE_TOKEN
        authTokenSecretRef:
          name: *secret
          key: OPERATOR_WEBHOOK_KEY
