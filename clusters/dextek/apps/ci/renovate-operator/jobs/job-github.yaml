---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: github
spec:
  image: ghcr.io/krezh/renovate-nix:43.202.0@sha256:c96d93fa3cfd70d676389b889d15952c4f059ae59f1e157641b2d54fdf987023
  discoverTopics:
    - renovate
  discoveryFilters:
    - krezh/*
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ONBOARDING_CONFIG_FILE_NAME
      value: .renovaterc.json5
    - name: RENOVATE_REDIS_URL
      value: "redis://dragonfly.databases.svc:6379/3"
    - name: RENOVATE_ALLOWED_COMMANDS
      value: |-
        [
          "^bash -c 'PKG=\\$\\(grep",
          "^nix run github:Mic92/nix-update",
          "^nix run github:nix-community/gomod2nix",
          "^nix run github:purpleclay/go-overlay#govendor",
          "^bash .github/scripts/update-hash.sh",
        ]
  parallelism: 10
  schedule: 0 * * * *
  provider:
    name: github
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  secretRef: &secret renovate-secret
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: *secret
        key: OPERATOR_WEBHOOK_KEY
