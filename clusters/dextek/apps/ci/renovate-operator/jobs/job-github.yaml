---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: github
spec:
  image: ghcr.io/krezh/renovate-nix:43.257.9@sha256:e14dc2b78f43c6f4f0f4846f413d0460ae3b7e2c57e33525fa92234866b14c9e
  discoverTopics:
    - renovate
  discoveryFilters:
    - krezh/*
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ONBOARDING_CONFIG_FILE_NAME
      value: .renovaterc.json5
    - name: RENOVATE_REDIS_URL
      value: "redis://dragonfly.databases.svc:6379/3"
    - name: RENOVATE_ALLOWED_COMMANDS
      value: |
        [
          "^nix run github:purpleclay/go-overlay#govendor",
          "^bash .github/scripts/update-hash.sh",
        ]
  parallelism: 10
  schedule: 0 * * * *
  provider:
    name: github
  githubAppReference:
    secretName: renovate-secret
    appIdSecretKey: GITHUB_APP_ID
    installationIdSecretKey: INSTALL_ID
    pemSecretKey: private-key.pem
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  secretRef: &secret renovate-secret
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: *secret
        key: OPERATOR_WEBHOOK_KEY
    sync:
      enabled: true
