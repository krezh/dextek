---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: github
spec:
  image: ghcr.io/krezh/renovate-nix:43.222.1@sha256:99e3eb19119fbc59fd9afa7008bc0e506398ca375a96acd991bed4e5d0c5b51e
  discoverTopics:
    - renovate
  discoveryFilters:
    - krezh/*
  extraEnv:
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-secret
          key: RENOVATE_GITHUB_COM_TOKEN
    - name: NIX_CONFIG
      value: "access-tokens = github.com=$(GITHUB_TOKEN)"
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ONBOARDING_CONFIG_FILE_NAME
      value: .renovaterc.json5
    - name: RENOVATE_REDIS_URL
      value: "redis://dragonfly.databases.svc:6379/3"
    - name: RENOVATE_ALLOWED_COMMANDS
      value: |-
        [
          "^bash -c 'PKG=\\$\\(grep",
          "^nix run github:Mic92/nix-update",
          "^nix run github:nix-community/gomod2nix",
          "^nix run github:purpleclay/go-overlay#govendor",
          "^bash .github/scripts/update-hash.sh",
        ]
  parallelism: 10
  schedule: 0 * * * *
  provider:
    name: github
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  secretRef: &secret renovate-secret
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: *secret
        key: OPERATOR_WEBHOOK_KEY
