---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate-job
spec:
  discoveryFilters:
    - dextek/*
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_GIT_AUTHOR
      value: dextek-bot <dextek-bot@noreply.codeberg.org>
    - name: RENOVATE_ALLOWED_COMMANDS
      value: |-
        [
          "^bash -c 'PKG=\\$\\(grep",
          "^nix run github:Mic92/nix-update",
          "^nix run github:nix-community/gomod2nix",
          "^nix run github:purpleclay/go-overlay#govendor",
          "^bash .forgejo/scripts/update-hash.sh",
        ]
  image: ghcr.io/krezh/renovate-nix:43.160.1
  parallelism: 10
  schedule: 0 * * * *
  provider:
    name: forgejo
    endpoint: https://codeberg.org/api/v1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  secretRef: renovate-secret
  webhook:
    enabled: true
    authentication:
      enabled: false # Set to true and configure secret if you want webhook authentication
