---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-mirror
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gitea-mirror
  values:
    controllers:
      gitea-mirror:
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
        containers:
          app:
            image:
              repository: ghcr.io/raylabshq/gitea-mirror
              tag: v3.15.6
            envFrom:
              - secretRef:
                  name: gitea-mirror-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      gitea-mirror:
        controller: gitea-mirror
        ports:
          http:
            port: 4321
    route:
      gitea-mirror:
        hostnames:
          - gitea-mirror.talos.plexuz.xyz
        parentRefs:
          - name: gateway-internal
            namespace: network
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-block
        globalMounts:
          - path: /app/data
