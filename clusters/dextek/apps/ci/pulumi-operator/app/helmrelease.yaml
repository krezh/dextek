---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pulumi-kubernetes-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: pulumi-kubernetes-operator
  values:
    fullnameOverride: pulumi-kubernetes-operator
    serviceMonitor:
      enabled: true
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi
