---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: publish-k8s-schemas-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: publish-k8s-schemas-git-push
    template:
      data:
        github-token: "{{ .GITHUB_TOKEN }}"
        github-repo: "krezh/k8s-schemas"
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: /Kubernetes/DexTek/PublishK8sSchemas/GITHUB_TOKEN
