---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: codeberg-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: codeberg-runner
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: true
              dir: /data/cache
            container:
              docker_host: "-"
              workdir_parent: shared/workdir
            kubernetes:
              namespace: {{ .Release.Namespace }}
              poll_timeout: 10m
            log:
              level: info
            runner:
              capacity: 10
              file: /persistent/.runner
              labels:
                - ubuntu-latest:k8spod:/config/podspec-default.yaml
                - ubuntu-24.04:k8spod:/config/podspec-default.yaml
                - default:k8spod:/config/podspec-default.yaml
                - docker:k8spod:/config/podspec-dind.yaml
                - nix:k8spod:/config/podspec-nix.yaml
              timeout: 3h
          podspec-default.yaml: |-
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    memory: 16G
                  requests:
                    cpu: 100m
                    memory: 4G
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: nix
                    mountPath: /nix
            volumes:
              - name: workspace
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes: ["ReadWriteOnce"]
                      storageClassName: ceph-block
                      resources:
                        requests:
                          storage: 100Gi
              - name: nix
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes: ["ReadWriteOnce"]
                      storageClassName: ceph-block
                      resources:
                        requests:
                          storage: 100Gi
            restartPolicy: Never
          podspec-nix.yaml: |-
            hostUsers: false
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04
                imagePullPolicy: IfNotPresent
                name: main
                securityContext:
                  privileged: true
                resources:
                  limits:
                    memory: 16G
                  requests:
                    cpu: 100m
                    memory: 4G
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: nix
                    mountPath: /nix
            volumes:
              - name: workspace
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes: ["ReadWriteOnce"]
                      storageClassName: ceph-block
                      resources:
                        requests:
                          storage: 100Gi
              - name: nix
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes: ["ReadWriteOnce"]
                      storageClassName: ceph-block
                      resources:
                        requests:
                          storage: 100Gi
            restartPolicy: Never
          podspec-dind.yaml: |-
            initContainers:
              - name: dind
                image: docker:29-dind
                securityContext:
                  privileged: true
                restartPolicy: Always
                env:
                  - name: DOCKER_TLS_CERTDIR
                    value: /certs
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 4Gi
                volumeMounts:
                  - name: docker-storage
                    mountPath: /var/lib/docker
                  - name: docker-certs
                    mountPath: /certs
                readinessProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - test -f /certs/client/ca.pem && test -f /certs/client/cert.pem && test -f /certs/client/key.pem
                  initialDelaySeconds: 2
                  periodSeconds: 1
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                  - name: DOCKER_HOST
                    value: tcp://localhost:2376
                  - name: DOCKER_TLS_VERIFY
                    value: "1"
                  - name: DOCKER_CERT_PATH
                    value: /certs/client
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    memory: 2Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: docker-certs
                    mountPath: /certs
                    readOnly: true
            volumes:
              - name: workspace
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes: ["ReadWriteOnce"]
                      storageClassName: ceph-block
                      resources:
                        requests:
                          storage: 100Gi
              - name: docker-storage
                emptyDir: {}
              - name: docker-certs
                emptyDir: {}
            restartPolicy: Never

    controllers:
      codeberg-runner:
        type: statefulset
        replicas: 1
        statefulset:
          volumeClaimTemplates:
            - accessMode: ReadWriteOnce
              globalMounts:
                - path: /persistent
              name: persistent
              size: 1Gi
        pod:
          labels:
            app.kubernetes.io/component: codeberg-runner
          annotations:
            reloader.stakater.com/auto: "true"
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000

        initContainers:
          register-runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: latest@sha256:0a8ef9dd41a4c29903db8f9f125b20e58e2ccb5c3c539beb1e02db139d7cf7a2
            command:
              - sh
              - -c
              - |
                if [ -f /persistent/.runner ]; then
                  echo "Runner already registered, skipping"
                  exit 0
                fi
                echo "Registering runner..."
                cd /persistent && forgejo-runner register \
                  --instance https://codeberg.org \
                  --token "${RUNNER_TOKEN}" \
                  --name k8s-runner \
                  --labels "default:k8spod:/config/podspec-default.yaml" \
                  --no-interactive
            envFrom:
              - secretRef:
                  name: codeberg-runner-secret

        containers:
          runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: latest@sha256:0a8ef9dd41a4c29903db8f9f125b20e58e2ccb5c3c539beb1e02db139d7cf7a2
            command:
              - /bin/forgejo-runner
              - daemon
              - --config
              - /config/runner.yaml
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true

    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      temp:
        type: emptyDir
        sizeLimit: 10Gi
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp

    rbac:
      bindings:
        codeberg-runner:
          type: RoleBinding
          roleRef:
            identifier: codeberg-runner
          subjects:
            - identifier: codeberg-runner
      roles:
        codeberg-runner:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - create
                - get
                - delete
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get

    serviceAccount:
      codeberg-runner: {}
