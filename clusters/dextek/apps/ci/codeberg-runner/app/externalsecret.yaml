---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codeberg-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: codeberg-runner-secret
  data:
    - secretKey: RUNNER_TOKEN
      remoteRef:
        key: /Kubernetes/DexTek/Codeberg/RUNNER_TOKEN
