---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tf-controller
  namespace: flux-system
spec:
  targetNamespace: ci
  dependsOn:
    - name: flux-instance
    - name: external-secrets-stores
  path: ./clusters/dextek/apps/ci/tf-controller/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 3m
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tf-controller-terraforms
  namespace: flux-system
spec:
  targetNamespace: ci
  dependsOn:
    - name: tf-controller
  path: ./clusters/dextek/apps/ci/tf-controller/terraforms
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 3m
