---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  values:
    awsPackage:
      repository: ghcr.io/flux-iac/aws-primitive-modules
      tag: v4.38.0-v1alpha11
    image:
      repository: ghcr.io/flux-iac/tofu-controller
      pullPolicy: IfNotPresent
      tag: v0.16.4
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.12.5@sha256:98fc72390e74c562586438ff5fb525bf4a3de4e01c2b2b3c3c63249e7aec2501
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
