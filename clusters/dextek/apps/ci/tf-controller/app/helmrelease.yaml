---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  values:
    awsPackage:
      repository: ghcr.io/flux-iac/aws-primitive-modules
      tag: v4.38.0-v1alpha11
    image:
      repository: ghcr.io/flux-iac/tofu-controller
      pullPolicy: IfNotPresent
      tag: v0.16.4
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.12.4@sha256:c3717fe9555ded7605792baaf4e920c4db818372741b5cf15aa8dd3f6db1487a
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
