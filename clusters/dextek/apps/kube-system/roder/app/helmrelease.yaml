---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roder
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: roder
  values:
    replicaCount: 1
    podAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: roder-secret
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          url: https://roder.plexuz.xyz/health
      parentRefs:
        - name: gateway-internal
          namespace: network
      hostnames: ["roder.plexuz.xyz"]
    resources:
      limits:
        memory: 400Mi
      requests:
        cpu: 50m
        memory: 400Mi
