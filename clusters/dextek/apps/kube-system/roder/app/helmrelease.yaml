---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roder
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: roder
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    envFrom:
      - secretRef:
          name: roder-secret
    env:
      RODER_ALERTMANAGER_URL: "alertmanager-operated.svc.monitoring.cluster.local"
    resources:
      requests:
        cpu: 50m
        memory: 300Mi
      limits:
        memory: 400Mi
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          url: https://roder.plexuz.xyz/health
      parentRefs:
        - name: gateway-internal
          namespace: network
      hostnames: ["roder.plexuz.xyz"]
