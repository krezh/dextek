---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./namespace.yaml
  - ./mutatingadmissionpolicy.yaml
  - ../../../shared/templates/flux
  - ./cilium/ks.yaml
  - ./coredns/ks.yaml
  - ./metrics-server/ks.yaml
  - ./reloader/ks.yaml
  - ./snapshot-controller/ks.yaml
  - ./external-secrets/ks.yaml
  - ./descheduler/ks.yaml
  - ./k8tz/ks.yaml
  - ./irqbalance/ks.yaml
  - ./talos-etcd-defrag/ks.yaml
  - ./intel-gpu-resource-driver/ks.yaml
  - ./tuppr/ks.yaml
  - ./ksgate/ks.yaml
  - ./roder/ks.yaml
  - ./drm-exporter/ks.yaml
  - ./spegel/ks.yaml
transformers:
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: not-used
      namespace: kube-system
    unsetOnly: true
