---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ksgate
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: ksgate
  values:
    replicaCount: 2
    extraArgs:
      - --zap-log-level
      - info
