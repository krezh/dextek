---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: irqbalance
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: irqbalance
  values:
    defaultPodOptions:
      hostIPC: true
      hostPID: true
    controllers:
      irqbalance:
        type: daemonset
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/irqbalance
              tag: 1.9.5@sha256:0c79f820f7d30328fc161c1543fdee74df3f94b302249c086f123ea0b63211de
            env:
              IRQBALANCE_BANNED_CPULIST: 12-19 # 12-19 are E-cores
            resources:
              requests:
                cpu: 25m
                memory: 10M
              limits:
                memory: 10M
            securityContext:
              privileged: true
    persistence:
      run:
        type: emptyDir
        globalMounts:
          - path: /run/irqbalance
