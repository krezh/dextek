---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: irqbalance
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: irqbalance
  values:
    defaultPodOptions:
      hostIPC: true
      hostPID: true
    controllers:
      irqbalance:
        type: daemonset
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/irqbalance
              tag: 1.9.5@sha256:a6d8c6f69c56f653022861ae7b1813cf41751dc5289a35d99075c9d113c29817
            env:
              IRQBALANCE_BANNED_CPULIST: 12-19 # 12-19 are E-cores
            resources:
              requests:
                cpu: 25m
                memory: 10M
              limits:
                memory: 10M
            securityContext:
              privileged: true
    persistence:
      run:
        type: emptyDir
        globalMounts:
          - path: /run/irqbalance
