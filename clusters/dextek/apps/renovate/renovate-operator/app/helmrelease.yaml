---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  values:
    fullnameOverride: renovate-operator
    route:
      enabled: true
      hostnames:
        - renovate.talos.plexuz.xyz
      parentRefs:
        - name: gateway-internal
          namespace: network
    webhook:
      enabled: true
