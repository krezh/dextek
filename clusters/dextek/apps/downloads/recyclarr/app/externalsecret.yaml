---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr
  namespace: downloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: recyclarr-secret
    template:
      data:
        RADARR__API_KEY: "{{ .RADARR_API_KEY }}"
        SONARR__API_KEY: "{{ .SONARR_API_KEY }}"
  data:
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Radarr/RADARR_API_KEY
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Sonarr/SONARR_API_KEY
