---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pinchflat
  namespace: flux-system
spec:
  targetNamespace: downloads
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: volsync
  path: ./clusters/dextek/apps/downloads/pinchflat/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: false
  interval: 30m
  timeout: 5m
  components:
    - ../../../../../shared/components/ext-auth
    - ../../../../../shared/components/gpu
    - ../../../../../shared/components/volsync
    - ../../../../../shared/components/zeroscaler
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 5Gi
      KOPIUR_CLAIM: pinchflat-config
      KOPIUR_CAPACITY: 10Gi
      EXT_AUTH_OUTPOST: external
      EXT_AUTH_TARGET: *app
