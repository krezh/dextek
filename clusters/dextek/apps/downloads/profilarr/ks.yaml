---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app profilarr
  namespace: flux-system
spec:
  targetNamespace: downloads
  dependsOn:
    - name: volsync
    - name: envoy-gateway
  path: ./clusters/dextek/apps/downloads/profilarr/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: false
  interval: 1h
  timeout: 5m
  components:
    - ../../../../../shared/components/volsync
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 5Gi
      KOPIUR_CAPACITY: 10Gi
      VOLSYNC_CLAIM: *app
      EXT_AUTH_OUTPOST: external
      EXT_AUTH_TARGET: *app
