# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent
  namespace: downloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: qbittorrent-secret
    template:
      data:
        WIREGUARD_ENDPOINT_IP: "{{ .VPN_ENDPOINT_IP }}"
        WIREGUARD_ENDPOINT_PORT: "{{ .VPN_ENDPOINT_PORT }}"
        WIREGUARD_PRIVATE_KEY: "{{ .WIREGUARD_PRIVATE_KEY }}"
        WIREGUARD_PUBLIC_KEY: "{{ .WIREGUARD_PUBLIC_KEY }}"
        WIREGUARD_ADDRESSES: "{{ .WIREGUARD_ADDRESSES }}"
        WIREGUARD_DNS: "{{ .WIREGUARD_DNS }}"
        GLUETUN_CONTROL_SERVER_API_KEY: "{{ .GLUETUN_API_KEY }}"
        auth.toml: |
          [[roles]]
          name = "gluetun-qb-port-sync"
          routes = [
            "GET /v1/publicip/ip",
            "GET /v1/openvpn/portforwarded"
          ]
          auth = "apikey"
          apikey = "{{ .GLUETUN_API_KEY }}"
  data:
    - secretKey: VPN_ENDPOINT_IP
      remoteRef:
        key: /Kubernetes/DexTek/VPN/VPN_ENDPOINT_IP
    - secretKey: VPN_ENDPOINT_PORT
      remoteRef:
        key: /Kubernetes/DexTek/VPN/VPN_ENDPOINT_PORT
    - secretKey: WIREGUARD_PRIVATE_KEY
      remoteRef:
        key: /Kubernetes/DexTek/VPN/WIREGUARD_PRIVATE_KEY
    - secretKey: WIREGUARD_PUBLIC_KEY
      remoteRef:
        key: /Kubernetes/DexTek/VPN/WIREGUARD_PUBLIC_KEY
    - secretKey: WIREGUARD_ADDRESSES
      remoteRef:
        key: /Kubernetes/DexTek/VPN/WIREGUARD_ADDRESSES
    - secretKey: WIREGUARD_DNS
      remoteRef:
        key: /Kubernetes/DexTek/VPN/WIREGUARD_DNS
    - secretKey: GLUETUN_API_KEY
      remoteRef:
        key: /Kubernetes/DexTek/VPN/GLUETUN_API_KEY
