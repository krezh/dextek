---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 30m
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    gitea:
      admin:
        username: ""
      config:
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: redis://dragonfly.databases.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s
        cron.archive_cleanup:
          ENABLED: true
          RUN_AT_START: true
          SCHEDULE: "@every 1h"
          OLDER_THAN: 2h
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        lfs:
          PATH: /data/git/lfs
        mailer:
          ENABLED: false
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        queue:
          TYPE: redis
          CONN_STR: redis://dragonfly.databases.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s
        repository:
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.actions
          DISABLED_REPO_UNITS: repo.ext_wiki,repo.ext_issues
          ROOT: /data/git/repositories
        repository.pull-request:
          DEFAULT_MERGE_STYLE: squash
        repository.signing:
          FORMAT: ssh
          SIGNING_KEY: /data/signing/ed25519.pub
          SIGNING_NAME: git.plexuz.xyz Instance
          SIGNING_EMAIL: noreply@git.plexuz.xyz
          INITIAL_COMMIT: pubkey
          CRUD_ACTIONS: pubkey, parentsigned
          WIKI: never
          MERGES: pubkey
        security:
          REVERSE_PROXY_TRUSTED_PROXIES: 10.244.0.0/16
        server:
          APP_DATA_PATH: /data/gitea
          ROOT_URL: https://git.plexuz.xyz
          SSH_DOMAIN: git.plexuz.xyz
          SSH_PORT: &sshPort 22
          SSH_SERVER_HOST_KEYS: ssh/ssh_host_ed25519_key
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          DEFAULT_ENABLE_TIMETRACKING: false
          DISABLE_REGISTRATION: false
          SHOW_REGISTRATION_BUTTON: false
        service.explore:
          DISABLE_CODE_PAGE: false
          DISABLE_ORGANIZATIONS_PAGE: true
          DISABLE_USERS_PAGE: true
          REQUIRE_SIGNIN_VIEW: false
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://dragonfly.databases.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s
          SESSION_LIFE_TIME: "1209600"
        webhook:
          ALLOWED_HOST_LIST: "*"
      oauth:
        - name: authentik
          provider: openidConnect
          autoDiscoverUrl: https://sso.plexuz.xyz/application/o/forgejo/.well-known/openid-configuration
          existingSecret: forgejo-authentik-oidc
          groupClaimName: groups
          adminGroup: forgejo-admins
          scopes: openid profile email groups
    extraContainerVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraInitVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraVolumes:
      - name: signing-key
        secret:
          secretName: forgejo-signing-key
          defaultMode: 0400
    httpRoute:
      enabled: false
    image:
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 15.0.0-rootless
    persistence:
      create: false
      claimName: forgejo
    service:
      ssh:
        port: *sshPort
    tcpRoute:
      enabled: true
      parentRefs:
        - name: gateway-external
          namespace: network
          sectionName: ssh
