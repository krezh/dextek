---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alert-manager
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: alertmanager-secret
    template:
      data:
        #ALERTMANAGER_HEARTBEAT_URL: "{{ .ALERTMANAGER_HEARTBEAT_URL }}"
        ALERTMANAGER_PUSHOVER_TOKEN: "{{ .ALERTMANAGER_PUSHOVER_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
  data:
    - secretKey: ALERTMANAGER_PUSHOVER_TOKEN
      remoteRef:
        key: /Kubernetes/DexTek/AlertManager/ALERTMANAGER_PUSHOVER_TOKEN
    - secretKey: PUSHOVER_USER_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Pushover/PUSHOVER_USER_KEY
