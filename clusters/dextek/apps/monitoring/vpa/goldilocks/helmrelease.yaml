---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
spec:
  interval: 30m
  chart:
    spec:
      chart: goldilocks
      version: 10.3.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds-charts
  values:
    metrics-server:
      enabled: false
      apiService:
        create: true
    dashboard:
      basePath: null
      enabled: true
      revisionHistoryLimit: 0
      replicaCount: 2
      service:
        type: ClusterIP
        port: 80
