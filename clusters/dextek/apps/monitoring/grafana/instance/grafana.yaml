---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    grafana.internal/instance: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"
    auth:
      disable_login_form: "false"
      signout_redirect_url: https://sso.plexuz.xyz/application/o/grafana/end-session/
      oauth_auto_login: "true"
      oauth_allow_insecure_email_lookup: "true"
    auth.anonymous:
      enabled: "true"
      org_name: Main Org.
      org_role: Viewer
      hide_version: "true"
    auth.generic_oauth:
      name: authentik
      enabled: "true"
      scopes: openid profile email groups
      auth_url: https://sso.plexuz.xyz/application/o/authorize/
      token_url: https://sso.plexuz.xyz/application/o/token/
      api_url: https://sso.plexuz.xyz/application/o/userinfo/
      # Optionally map user groups to Grafana roles
      role_attribute_path: contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
    log:
      mode: console
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
    security:
      angular_support_enabled: "true"
    metrics:
      enabled: "true"
    server:
      enable_gzip: "true"
      root_url: https://grafana.plexuz.xyz
  httpRoute:
    spec:
      hostnames:
        - grafana.plexuz.xyz
      parentRefs:
        - name: gateway-internal
          namespace: network
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          containers:
            - name: grafana
              envFrom:
                - secretRef:
                    name: grafana-secret
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: ceph-block
  disableDefaultSecurityContext: All
