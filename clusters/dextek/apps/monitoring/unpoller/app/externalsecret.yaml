---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unpoller
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: unpoller-secret
    template:
      data:
        UP_UNIFI_DEFAULT_API_KEY: "{{ .API_KEY }}"
  data:
    - secretKey: API_KEY
      remoteRef:
        key: /Kubernetes/DexTek/Unpoller/API_KEY
