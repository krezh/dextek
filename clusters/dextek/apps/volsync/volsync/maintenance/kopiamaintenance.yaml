---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
  namespace: volsync
spec:
  enabled: true
  trigger:
    schedule: 0 */8 * * *
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /mnt/tank/kopia
          server: jotunheim.fast.internal
  repository:
    repository: volsync-maintenance-secret
