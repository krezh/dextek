---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur
  namespace: flux-system
spec:
  targetNamespace: kopiur-system
  dependsOn:
    - name: external-secrets-stores
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kopiur
      namespace: kopiur-system
  path: ./clusters/dextek/apps/kopiur-system/kopiur/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-repository
  namespace: flux-system
spec:
  dependsOn:
    - name: kopiur
  interval: 30m
  path: ./clusters/dextek/apps/kopiur-system/kopiur/repository
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  targetNamespace: kopiur-system
  wait: false
