---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: tank
spec:
  allowedNamespaces:
    all: true
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: jotunheim.fast.internal
          path: /mnt/tank/kopia
  encryption:
    passwordSecretRef:
      name: kopiur-repository-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  # Adopt the existing kopia repo created by volsync — connect, never re-initialize.
  create:
    enabled: false
  # Disable default-managed maintenance so the standalone Maintenance CR below
  # takes over the lease deliberately (avoid two writers running kopia maintenance).
  maintenance:
    enabled: false
  # Re-scan during the migration window so snapshots volsync keeps writing appear.
  catalog:
    periodicRefresh: true
    refreshInterval: 1h
    retain:
      perIdentity: 100
      maxAgeDays: 90
