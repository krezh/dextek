---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/maintenance_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Maintenance
metadata:
  name: tank
  namespace: kopiur-system
spec:
  repository:
    kind: ClusterRepository
    name: tank
  schedule:
    quick:
      cron: "0 */6 * * *"
      jitter: 30m
    full:
      cron: "0 3 * * 0"
      jitter: 1h
    timezone: UTC
  ownership:
    # Take over the maintenance lease from volsync. PromptCondition surfaces the
    # conflict and waits; switch to Force only after volsync maintenance has stopped.
    owner: "kopiur/tank"
    takeoverPolicy: PromptCondition
