---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: cloudflare-secret
    template:
      data:
        CLOUDFLARE_API_TOKEN: "{{ .CLOUDFLARE_APITOKEN }}"
  data:
    - secretKey: CLOUDFLARE_APITOKEN
      remoteRef:
        key: /Kubernetes/DexTek/CertManager/CLOUDFLARE_APITOKEN
