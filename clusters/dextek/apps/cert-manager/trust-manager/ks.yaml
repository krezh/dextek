---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trust-manager
  namespace: flux-system
spec:
  targetNamespace: cert-manager
  dependsOn:
    - name: cert-manager
  path: ./clusters/dextek/apps/cert-manager/trust-manager/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  wait: true
  interval: 1h
  retryInterval: 1m
  timeout: 3m
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trust-manager-config
  namespace: flux-system
spec:
  targetNamespace: cert-manager
  dependsOn:
    - name: trust-manager
    - name: cert-manager-issuers
  path: ./clusters/dextek/apps/cert-manager/trust-manager/config
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  interval: 1h
  retryInterval: 1m
  timeout: 3m
