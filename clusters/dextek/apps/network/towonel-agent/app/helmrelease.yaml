---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-agent
spec:
  chartRef:
    kind: OCIRepository
    name: towonel-agent
  interval: 30m
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
    controllers:
      towonel-agent:
        type: deployment
        replicas: 2
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: git.erwanleboucher.dev/eleboucher/towonel-agent
              tag: 0.0.21
            env:
              RUST_LOG: info
              # Wildcard: route ALL *.plexuz.xyz to gateway-external
              TOWONEL_AGENT_SERVICES: '[{"hostname":"*.plexuz.xyz","origin":"gateway-external.network.svc.cluster.local:443"}]'
              TOWONEL_INVITE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: towonel-agent-secret
                    key: TOWONEL_INVITE_TOKEN
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 3
                  periodSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 2
                  periodSeconds: 2
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 64Mi
    service:
      app:
        controller: towonel-agent
        ports:
          http:
            port: 9090
