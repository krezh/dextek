---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: towonel-agent
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://git.erwanleboucher.dev/eleboucher/towonel/src/branch/main/deploy/grafana/towonel-agent.json
---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: towonel-hub
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://git.erwanleboucher.dev/eleboucher/towonel/src/branch/main/deploy/grafana/towonel-hub.json
