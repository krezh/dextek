---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/pangolin.home-operations.com/newtsite_v1alpha1.json
apiVersion: pangolin.home-operations.com/v1alpha1
kind: NewtSite
metadata:
  name: dextek
spec:
  name: dextek
  autoDiscover:
    annotationPrefix: pangolin-operator
    denyCountries: RU,CN,KP,IR,BY,IL,TR,KZ
    gatewayName: gateway-external
    gatewayNamespace: network
    ssl: true
    enableRouteDiscovery: true
    enableServiceDiscovery: true
  newt:
    # renovate: datasource=github-releases depName=fosrl/newt
    tag: 1.11.0
    mtu: 1380
    acceptClients: true
    useNativeInterface: true
    replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 100M
