---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pangolin-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: pangolin-operator
  values:
    image:
      repository: ghcr.io/home-operations/pangolin-operator
      tag: 0.1.1
    pangolin:
      existingSecret: pangolin-operator-secret
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
