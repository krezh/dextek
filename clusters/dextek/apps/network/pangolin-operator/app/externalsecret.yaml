---
# yaml-language-server: $schema=https://kubernetes-schemas.plexuz.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pangolin-operator
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: pangolin-operator-secret
    creationPolicy: Owner
    template:
      data:
        PANGOLIN_API_URL: "{{ .PANGOLIN_API_URL }}"
        PANGOLIN_API_KEY: "{{ .PANGOLIN_API_KEY }}"
        PANGOLIN_ENDPOINT: "{{ .PANGOLIN_ENDPOINT }}"
        PANGOLIN_ORG_ID: "{{ .PANGOLIN_ORG_ID }}"
  dataFrom:
    - find:
        path: /Kubernetes/DexTek/Pangolin
        name:
          regexp: "(.*)"
