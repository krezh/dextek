---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: plexuz-default-cert
  namespace: network
spec:
  secretName: plexuz-default-tls
  dnsNames:
    - "*.talos.plexuz.xyz"
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: RSA
    size: 4096
    rotationPolicy: Always
