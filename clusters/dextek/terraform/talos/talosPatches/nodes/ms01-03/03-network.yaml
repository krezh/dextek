---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: ms01-03.k8s.plexuz.xyz
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: eth0
selector:
  match: link.driver == "igc" && mac(link.permanent_addr) == "58:47:ca:76:7f:52"
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: eth1
selector:
  match: link.driver == "igc" && mac(link.permanent_addr) == "58:47:ca:76:7f:51"
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: eth10g
selector:
  match: link.driver == "i40e" && mac(link.permanent_addr) == "58:47:ca:76:7f:4f"
---
apiVersion: v1alpha1
kind: BondConfig
name: bond0
links:
  - eth0
  - eth1
bondMode: active-backup
mtu: 1500
---
apiVersion: v1alpha1
kind: DHCPv4Config
name: bond0
clientIdentifier: mac
---
apiVersion: v1alpha1
kind: BondConfig
name: bond1
links:
  - eth10g
bondMode: active-backup
mtu: 1500
addresses:
  - address: 10.10.0.21/27
routes:
  - destination: 10.10.0.0/27
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.100
vlanID: 100
parent: bond0
mtu: 1500
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.10
vlanID: 10
parent: bond0
mtu: 1500
