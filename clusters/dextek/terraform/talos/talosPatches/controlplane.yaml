cluster:
  apiServer:
    admissionControl:
      $patch: delete
    # kauth webhook token authenticator — lets the API server validate kauth
    # session credentials against the session CRD so revocation takes effect
    # within the cache TTL. The token is an AES-GCM encrypted session ID;
    # in-cluster HTTP is safe because the application layer handles encryption.
    extraArgs:
      authentication-token-webhook-config-file: /etc/kubernetes/webhook-auth/kauth.yaml
      authentication-token-webhook-cache-ttl: 30s # max revocation window
    extraVolumes:
      - hostPath: /var/kubernetes/webhook-auth
        mountPath: /etc/kubernetes/webhook-auth
        readonly: true
machine:
  files:
    - op: create
      path: /var/kubernetes/webhook-auth/kauth.yaml
      permissions: 0o600
      content: |
        apiVersion: v1
        kind: Config
        clusters:
          - name: kauth
            cluster:
              server: http://kauth.auth.svc.cluster.local:8081/webhook/token-review
        users:
          - name: apiserver
            user: {}
        contexts:
          - name: kauth
            context:
              cluster: kauth
              user: apiserver
        current-context: kauth
