services:
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:latest
    user: "568:568"
    ports:
      - "5000:5000"
    volumes:
      - /mnt/tank/apps/zot/data:/var/lib/registry
    command: ["serve", "/etc/zot/config.yaml"]
    configs:
      - source: zot-config
        target: /etc/zot/config.yaml
    dns:
      - 127.0.0.11
      - 1.1.1.1
    networks:
      - apps-internal
      - default
    restart: unless-stopped

networks:
  apps-internal:
    external: true
  default:
    driver: bridge

configs:
  zot-config:
    content: |
      distSpecVersion: "1.1.0"
      storage:
        rootDirectory: /var/lib/registry
        gc: true
        dedupe: true
      http:
        address: 0.0.0.0
        port: 5000
      log:
        level: info
      extensions:
        ui:
          enable: true
        search:
          enable: true
        scrub:
          enable: true
          interval: 24h
        trust:
          enable: false
          cosign: false
          notation: false
        lint:
          enable: false
        sync:
          enable: true
          registries:
            - urls:
                - https://index.docker.io
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/docker"
            - urls:
                - https://ghcr.io
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/ghcr"
            - urls:
                - https://gcr.io
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/gcr"
            - urls:
                - https://quay.io
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/quay"
            - urls:
                - https://mcr.microsoft.com
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/mcr"
            - urls:
                - https://public.ecr.aws
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/ecr"
            - urls:
                - https://registry.k8s.io
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/k8s"
            - urls:
                - https://mirror.gcr.io
              onDemand: true
              tlsVerify: true
              maxRetries: 3
              retryDelay: "5m"
              syncTimeout: "10m"
              content:
                - prefix: "**"
                  destination: "/mirror-gcr"
