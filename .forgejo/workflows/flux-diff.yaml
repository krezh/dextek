---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Flux Diff"

on:
  pull_request:
    branches: ["main"]
    paths: ["clusters/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changed-clusters:
    name: Changed Clusters
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-clusters.outputs.changed_files }}
    steps:
      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Changed Clusters
        id: changed-clusters
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: clusters/!(shared)/**
          include_only_directories: true
          max_depth: 2

      - name: List All Changed Clusters
        env:
          CHANGED_FILES: ${{ steps.changed-clusters.outputs.changed_files }}
        run: echo "$CHANGED_FILES"

  diff:
    name: Flux Local - Diff
    runs-on: ubuntu-latest
    needs: ["changed-clusters"]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        paths: ${{ fromJSON(needs.changed-clusters.outputs.matrix) }}
        resources: ["helmrelease", "kustomization"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: "${{ github.token }}"
          persist-credentials: false
          path: pull

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: "${{ github.token }}"
          persist-credentials: false
          ref: "${{ github.event.repository.default_branch }}"
          path: default

      - name: Diff Resources
        uses: docker://ghcr.io/allenporter/flux-local:v8.2
        with:
          args: >-
            diff ${{ matrix.resources }}
            --unified 6
            --path /github/workspace/pull/${{ matrix.paths }}/flux/config
            --path-orig /github/workspace/default/${{ matrix.paths }}/flux/config
            --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart"
            --limit-bytes 10000
            --all-namespaces
            --sources "flux-system"
            --output-file diff.patch

      - name: Generate Diff
        id: diff
        run: |
          echo 'diff<<EOF' >> $GITHUB_OUTPUT
          cat diff.patch >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Add Comment
        env:
          GH_TOKEN: ${{ github.token }}
          HEADER: ${{ github.event.pull_request.number }}/${{ matrix.paths }}/${{ matrix.resources }}
          DIFF_OUTPUT: ${{ steps.diff.outputs.diff }}
        run: |
          MARKER="<!-- sticky-comment: ${HEADER} -->"
          COMMENT_BODY="${MARKER}
          \`\`\`diff
          ${DIFF_OUTPUT}
          \`\`\`"

          # Get existing comments
          COMMENT_ID=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" | \
            jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id')

          if [ -n "${COMMENT_ID}" ]; then
            # Update existing comment
            curl -s -X PATCH -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ github.api_url }}/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -d "{\"body\": $(echo "${COMMENT_BODY}" | jq -Rs .)}"
          else
            # Create new comment
            curl -s -X POST -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -d "{\"body\": $(echo "${COMMENT_BODY}" | jq -Rs .)}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs: ["diff"]
    name: Flux Local - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: echo "All jobs passed or skipped" && echo "$RESULTS"
