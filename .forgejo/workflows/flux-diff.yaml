---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Flux Local"

on:
  pull_request:
    branches: ["main"]
    paths: ["clusters/**", "!clusters/**/terraform/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changed-clusters:
    name: Changed Clusters
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-clusters.outputs.changed_files }}
    steps:
      - name: Get Changed Clusters
        id: changed-clusters
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: clusters/!(shared)/**
          include_only_directories: true
          max_depth: 2

      - name: List All Changed Clusters
        env:
          CHANGED_FILES: ${{ steps.changed-clusters.outputs.changed_files }}
        run: echo "$CHANGED_FILES"

  test:
    if: ${{ needs.changed-clusters.outputs.matrix != '[]' }}
    name: Run flux-local test
    runs-on: ubuntu-latest
    needs: ["changed-clusters"]
    strategy:
      matrix:
        paths: ${{ fromJSON(needs.changed-clusters.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run flux-local test
        shell: bash
        run: |-
          flux-local test --enable-helm --all-namespaces --path ${{ matrix.paths }}/flux/config -v

  diff:
    if: ${{ needs.changed-clusters.outputs.matrix != '[]' }}
    name: Run flux-local diff ${{ matrix.paths }}/${{ matrix.resources }}
    runs-on: ubuntu-latest
    needs: ["changed-clusters"]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        paths: ${{ fromJSON(needs.changed-clusters.outputs.matrix) }}
        resources: ["helmrelease", "kustomization"]
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "${{ github.event.repository.default_branch }}"
          path: default
          persist-credentials: false

      - name: Run flux-local diff
        shell: bash
        run: |-
          flux-local diff ${{ matrix.resources }} \
            --unified 6 \
            --path pull/${{ matrix.paths }}/flux/config \
            --path-orig default/${{ matrix.paths }}/flux/config \
            --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart" \
            --limit-bytes 10000 \
            --all-namespaces \
            --sources "flux-system" \
            --output-file diff.patch

      - name: Generate Diff
        id: diff
        run: |
          {
            echo 'diff<<EOF'
            cat diff.patch
            echo EOF
          } >> "${FORGEJO_OUTPUT}";
          {
            echo "## Flux ${{ matrix.paths }}/${{ matrix.resources }} diff"
            echo '```diff'
            cat diff.patch
            echo '```'
          } >> "${FORGEJO_STEP_SUMMARY}"

      - name: Add Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEADER: "${{ github.event.pull_request.number }}/${{ matrix.paths }}/${{ matrix.resources }}"
          DIFF_CONTENT: ${{ steps.diff.outputs.diff }}
        run: |-
          MARKER="<!-- sticky-comment: ${HEADER} -->"
          BODY=$(printf $'%s\\n```diff\\n%s\\n```' "${MARKER}" "${DIFF_CONTENT}")
          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")
          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)
          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ github.api_url }}/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ github.api_url }}/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs: ["test", "diff"]
    name: Flux Local - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: echo "All jobs passed or skipped" && echo "$RESULTS"
