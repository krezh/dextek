---
name: "Publish Terraform"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["infrastructure/terraform/**", "clusters/**/terraform/**"]

jobs:
  publish-infrastructure:
    name: Publish Infrastructure
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          permission-contents: read

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: "${{ steps.app-token.outputs.token }}"
          persist-credentials: false

      - name: Setup Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Generate tag
        id: generate-tag
        shell: bash
        run: echo "tag=ghcr.io/${{ github.repository_owner }}/manifests/infrastructure:$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Publish manifests
        shell: bash
        env:
          OCI_TAG: ${{ steps.generate-tag.outputs.tag }}
        run: |
          mkdir /tmp/terraform
          cp -r infrastructure/terraform/* /tmp/terraform
          for tf_dir in clusters/*/terraform/*; do
            cluster_name=$(basename "$(dirname "$(dirname "$tf_dir")")")
            terraform_folder_name=$(basename "$tf_dir")
            dest_dir="/tmp/terraform/${cluster_name}/${terraform_folder_name}"
            mkdir -p "$dest_dir"
            cp -r "$tf_dir"/* "$dest_dir"/
          done
          ls /tmp/terraform
          flux push artifact oci://$OCI_TAG \
              --path="/tmp/terraform" \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git branch --show-current)/$(git rev-parse HEAD)"

      - name: Tag manifests
        shell: bash
        env:
          OCI_TAG: ${{ steps.generate-tag.outputs.tag }}
        run: flux tag artifact oci://$OCI_TAG --tag main
