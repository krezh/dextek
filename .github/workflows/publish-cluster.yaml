---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Publish Cluster"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["clusters/**", ".sourceignore"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish Cluster
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      packages: write # push OCI artifact to GHCR
      id-token: write # needed for cosign keyless signing
    outputs:
      digest-url: ${{ steps.publish.outputs.digest-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish manifests
        id: publish
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          tag="ghcr.io/${REPOSITORY_OWNER}/manifests/cluster:$(git rev-parse --short HEAD)"
          digest_url=$(flux push artifact "oci://${tag}" \
              --path="." \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git branch --show-current)/$(git rev-parse HEAD)" \
              --output json | jq -r '.repository + "@" + .digest')
          flux tag artifact "oci://${tag}" --tag main
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "digest-url=${digest_url}" >> "${GITHUB_OUTPUT}"

  sign:
    name: Sign Cluster
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Setup Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Sign manifests
        shell: bash
        env:
          DIGEST_URL: ${{ needs.publish.outputs.digest-url }}
        run: cosign sign --yes "${DIGEST_URL}"

  flux:
    name: Trigger Flux reconciliation
    runs-on: ubuntu-latest
    needs: sign
    environment: prod
    steps:
      - env:
          WEBHOOK_TOKEN: ${{ secrets.FLUX_WEBHOOK_TOKEN }}
          WEBHOOK_URL: https://fluxhook.plexuz.xyz
        run: |-
          SIGNATURE=$(printf '{}' | openssl dgst -sha256 -r -hmac "${WEBHOOK_TOKEN}" | awk '{print $1}')
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST "${WEBHOOK_URL}" -H 'Content-Type: application/json' -H "X-Signature: sha256=${SIGNATURE}" -d '{}')
          echo "Flux webhook response: HTTP ${HTTP_STATUS}"
          test "${HTTP_STATUS}" = "200"
