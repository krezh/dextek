---
name: attic
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    configs:
      - source: caddy-config
        target: /etc/caddy/Caddyfile
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
  attic:
    image: ghcr.io/zhaofengli/attic:latest
    restart: unless-stopped
    environment:
      ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64: "${ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64}"
      ATTIC_SERVER_DATABASE_URL: "postgresql://attic:attic@postgres:5432/attic"
    volumes:
      - attic-data:/var/lib/attic
    depends_on:
      postgres:
        condition: service_healthy
    configs:
      - source: attic-config
        target: /config/server.toml
    command: ["--config", "/config/server.toml", "--mode", "monolithic"]
    healthcheck:
      test: ["CMD", "/sbin/nc", "-z", "localhost", "8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: attic
      POSTGRES_PASSWORD: attic
      POSTGRES_DB: attic
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attic"]
      interval: 5s
      timeout: 5s
      retries: 5
configs:
  caddy-config:
    content: |
      ${ATTIC_DOMAIN} {
        reverse_proxy attic:8080
      }
  attic-config:
    content: |
      listen = "[::]:8080"
      api-endpoint = "https://${ATTIC_DOMAIN}/"
      allowed-hosts = ["${ATTIC_DOMAIN}"]
      soft-delete-caches = false
      require-proof-of-possession = true
      [database]
      # URL is set via ATTIC_SERVER_DATABASE_URL env var
      [storage]
      type = "local"
      path = "/var/lib/attic/storage"
      [chunking]
      nar-size-threshold = 131072  # 128 KiB
      min-size = 65536             # 64 KiB
      avg-size = 131072            # 128 KiB
      max-size = 524288            # 512 KiB
      [compression]
      type = "zstd"
      [garbage-collection]
      interval = "12 hours"
      default-retention-period = "1 weeks"
volumes:
  attic-data:
  postgres-data:
  caddy-data:
  caddy-config:
